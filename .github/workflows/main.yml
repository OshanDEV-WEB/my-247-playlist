name: 24/7 Release Playlist Live Stream

on:
  schedule:
    - cron: '0 */5 * * *' # සෑම පැය 5කට වරක්ම ඔටෝ රීස්ටාර්ට් වේ
  workflow_dispatch: # බටන් එකෙන් ස්ටාර්ට් කළ හැක

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Start Playlist Stream
      run: |
        echo "Starting 24/7 Live Stream from GitHub Release Links..."
        
        # GitHub Release එකෙන් කෙළින්ම වීඩියෝ ලූප් කරමින් ස්ට්‍රීම් එක දිගටම යැවීම
        ffmpeg -f concat -safe 0 -protocol_whitelist file,http,https,tcp,tls,crypto -re -stream_loop -1 -i playlist.txt \
          -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,fps=30" \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
          -f flv "${{ secrets.STREAM_URL }}/${{ secrets.STREAM_KEY }}"
