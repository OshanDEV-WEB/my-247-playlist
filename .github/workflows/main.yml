name: 24/7 YouTube Playlist Live Stream

on:
  schedule:
    - cron: '0 */5 * * *' # සෑම පැය 5කට වරක්ම ඔටෝ රීස්ටාර්ට් වේ
  workflow_dispatch: # බටන් එකෙන් ස්ටාර්ට් කළ හැක

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install FFmpeg and yt-dlp
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3-pip
        # YouTube වීඩියෝ කෙළින්ම ස්ට්‍රීම් කිරීමට අවශ්‍ය yt-dlp ටූල් එක ඉන්ස්ටෝල් කිරීම
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    - name: Start Playlist Stream
      run: |
        echo "Starting 24/7 Live Stream from YouTube Links..."
        
        # playlist.txt එකේ ඇති YouTube ලින්ක්ස් එකින් එක කියවමින් 720p වලින් ලූප් කර ස්ට්‍රීම් කිරීම
        ffmpeg -f concat -safe 0 -protocol_whitelist file,http,https,tcp,tls,crypto -re -stream_loop -1 -i playlist.txt \
          -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,fps=30" \
          -c:v libx264 -preset veryfast -b:v 3000k -maxrate 3000k -bufsize 6000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
          -f flv "${{ secrets.STREAM_URL }}/${{ secrets.STREAM_KEY }}"
